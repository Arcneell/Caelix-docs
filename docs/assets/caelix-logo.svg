<!-- Caelix — logo principal (concept 04d affiné).
     Noyau orchestrateur + orbite + satellite avec traînée de comète. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="78%">
      <stop offset="0" stop-color="#1a2c46"/>
      <stop offset="1" stop-color="#0a0f1c"/>
    </radialGradient>
    <linearGradient id="arc" x1="0.1" y1="0.1" x2="0.9" y2="0.9">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  <rect width="96" height="96" rx="22" fill="url(#bg)"/>
  <!-- halo orbital diffus -->
  <circle cx="48" cy="48" r="28" fill="none" stroke="#3b82f6" stroke-width="6" opacity="0.06"/>
  <!-- orbite -->
  <circle cx="48" cy="48" r="22" fill="none" stroke="url(#arc)" stroke-width="2.4" opacity="0.38"/>
  <!-- traînée de comète (points dégressifs) -->
  <circle cx="58.3"  cy="28.6" r="5.0" fill="#67e8f9" opacity="0.80"/>
  <circle cx="50.3"  cy="26.1" r="4.2" fill="#67e8f9" opacity="0.62"/>
  <circle cx="41.9"  cy="26.9" r="3.4" fill="#67e8f9" opacity="0.46"/>
  <circle cx="34.4"  cy="30.7" r="2.6" fill="#67e8f9" opacity="0.32"/>
  <circle cx="28.95" cy="37"   r="1.9" fill="#67e8f9" opacity="0.20"/>
  <!-- satellite (tête) -->
  <circle cx="64.85" cy="33.86" r="12"  fill="#67e8f9" opacity="0.16"/>
  <circle cx="64.85" cy="33.86" r="6.5" fill="#a5f3fc"/>
  <circle cx="64.85" cy="33.86" r="2.6" fill="#ffffff"/>
  <!-- noyau central (orchestrateur) -->
  <circle cx="48" cy="48" r="10" fill="#22d3ee" opacity="0.12"/>
  <circle cx="48" cy="48" r="5"  fill="#e0f2fe"/>
</svg>
